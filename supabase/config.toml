project_id = "xukiivqxugrjugngkmex"

# post-message = endpoint publik. Punya rate-limit + validasi + service role
# sendiri, jadi gateway JWT dimatikan supaya publishable key (sb_publishable_…)
# bisa lewat.
[functions.post-message]
verify_jwt = false

# set-cover = jalur admin, auth lewat x-admin-token sendiri (timing-safe) + service
# role. Gateway JWT dimatikan supaya publishable key (sb_publishable_…) bisa lewat,
# konsisten dgn post-message.
[functions.set-cover]
verify_jwt = false

# delete-message = jalur admin SAMA dgn set-cover: auth via x-admin-token sendiri.
# callAdmin() TIDAK kirim header Authorization, jadi gateway JWT HARUS dimatikan —
# kalau tidak, gateway nolak duluan (UNAUTHORIZED_NO_AUTH_HEADER) dan fungsi tak
# pernah jalan. verify_jwt=true bikin admin login & hapus pesan mati total.
[functions.delete-message]
verify_jwt = false
